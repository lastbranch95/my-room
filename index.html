<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>My Room</title>
  <link rel="icon" type="image/png" href="./icon.png" />
  <link rel="apple-touch-icon" href="./icon.png" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app" class="app">
    <section id="loginView" class="login-view">
      <div class="login-card">
        <div class="app-mark">MR</div>
        <h1>My Room</h1>
        <p>自分専用トークルーム</p>
        <input id="emailInput" type="email" placeholder="メールアドレス" autocomplete="email" />
        <input id="passwordInput" type="password" placeholder="パスワード" autocomplete="current-password" />
        <button id="loginBtn">ログイン</button>
        <p id="loginError" class="error"></p>
      </div>
    </section>

    <section id="mainView" class="main-view hidden">
      <header class="topbar">
        <div class="topbar__left">
          <button id="backBtn" class="icon-btn hidden" aria-label="戻る">‹</button>
          <div>
            <h1 id="screenTitle">My Room</h1>
            <p id="screenSub">自分専用トークルーム</p>
          </div>
        </div>
        <div class="topbar__actions">
          <button id="settingsBtn" class="icon-btn" aria-label="設定">≡</button>
          <button id="searchToggleBtn" class="icon-btn" aria-label="検索">⌕</button>
        </div>
      </header>

      <section id="searchPanel" class="search-panel hidden">
        <input id="searchInput" type="search" placeholder="全ルーム検索 / このルーム内検索" />
        <button id="clearSearchBtn">クリア</button>
      </section>

      <section id="settingsPanel" class="settings-panel hidden">
        <div class="settings-row">
          <input id="newRoomNameInput" placeholder="新しいルーム名" />
          <button id="addRoomBtn">追加</button>
        </div>
        <div class="settings-row">
          <button id="refreshBtn">再読込</button>
          <button id="logoutBtn" class="ghost">ログアウト</button>
        </div>
      </section>

      <main id="roomListView" class="room-list-view"></main>

      <main id="chatView" class="chat-view hidden">
        <div id="messages" class="messages"></div>
      </main>

      <footer id="composer" class="composer hidden">
        <button id="imageBtn" class="plus-btn" aria-label="画像追加">＋</button>
        <input id="imageInput" type="file" accept="image/*" class="hidden" />
        <textarea id="messageInput" rows="1" placeholder="Aa"></textarea>
        <button id="sendBtn">送信</button>
      </footer>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
